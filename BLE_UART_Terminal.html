<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLE UART Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  /* ── Dark theme (default) ── */
  :root {
    --bg:        #0a0e0a;
    --panel:     #0d1410;
    --border:    #1a2e1a;
    --accent:    #33dd66;
    --accent-dim:#00aa33;
    --accent-glow:#33dd6633;
    --tx-color:  #ddaa33;
    --red:       #ff3333;
    --text:      #dfffdf;
    --text-dim:  #88bb88;
    --header-bg: linear-gradient(180deg, #0d1a0d 0%, #0a0e0a 100%);
    --scanlines:  1;
    --vignette:   1;
  }

  /* ── Light theme ── */
  :root.light {
    --bg:        #fafafa;
    --panel:     #ffffff;
    --border:    #e0e0e0;
    --accent:    #006622;
    --accent-dim:#004d19;
    --accent-glow:#00662233;
    --tx-color:  #884400;
    --red:       #cc2200;
    --text:      #111111;
    --text-dim:  #888888;
    --header-bg: linear-gradient(180deg, #f0f0f0 0%, #fafafa 100%);
    --scanlines:  0;
    --vignette:   0;
  }

  /* ── Theme toggle switch ── */
  .theme-switch {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    cursor: pointer;
    user-select: none;
  }
  .toggle-track {
    width: 32px; height: 17px;
    border-radius: 9px;
    border: 1px solid var(--accent-dim);
    background: var(--panel);
    position: relative;
    transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .toggle-thumb {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--accent);
    position: absolute;
    top: 2px; left: 2px;
    transition: transform 0.2s, background 0.2s;
  }
  :root.light .toggle-thumb { transform: translateX(15px); background: var(--accent); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Scanline overlay — hidden in light mode */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 1000;
    opacity: var(--scanlines);
    transition: opacity 0.3s;
  }

  /* CRT vignette — hidden in light mode */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 999;
    opacity: var(--vignette);
    transition: opacity 0.3s;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--header-bg);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    color: var(--accent);
    text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent-glow);
    letter-spacing: 0.15em;
  }

  .logo span {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 0.7rem;
    display: block;
    letter-spacing: 0.2em;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: all 0.3s;
  }
  .dot.connected {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent), 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }
  .dot.connecting {
    background: var(--tx-color);
    box-shadow: 0 0 6px var(--tx-color);
    animation: blink 0.5s infinite;
  }
  .dot.error {
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  #device-name {
    color: var(--accent);
    text-shadow: 0 0 6px var(--accent-glow);
  }

  main {
    display: flex;
    flex-direction: column;
    flex: 1;
    padding: 12px 16px;
    gap: 10px;
    overflow: hidden;
  }

  /* Control strip */
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 7px 16px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text-dim);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  button:hover:not(:disabled) {
    border-color: var(--green-dim);
    color: var(--accent);
    box-shadow: 0 0 8px var(--green-glow);
  }
  button:active:not(:disabled)::after { opacity: 0.08; }
  button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  #btn-toggle {
    border-color: var(--green-dim);
    color: var(--accent);
    box-shadow: 0 0 6px var(--green-glow);
  }
  #btn-toggle.connected {
    border-color: #5a1a1a;
    color: #ff6666;
  }
  #btn-toggle.connected:hover {
    border-color: var(--red);
    color: var(--red);
    box-shadow: 0 0 8px rgba(255,50,50,0.3);
  }
  #btn-clear {
    margin-left: auto;
  }

  .separator {
    width: 1px;
    height: 24px;
    background: var(--border);
  }

  .options {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  select, .options label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  select:focus { outline: none; border-color: var(--accent-dim); }

  .options label {
    display: flex;
    align-items: center;
    gap: 5px;
    border: none;
    padding: 0;
    cursor: pointer;
  }
  .options input[type=checkbox] {
    accent-color: var(--accent);
    width: 13px; height: 13px;
    cursor: pointer;
  }

  /* Terminal output */
  .terminal-wrapper {
    flex: 1;
    border: 1px solid var(--border);
    background: var(--panel);
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  .terminal-wrapper::before {
    content: 'OUTPUT';
    position: absolute;
    top: -1px;
    left: 12px;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    background: var(--panel);
    padding: 0 6px;
    z-index: 1;
  }

  #terminal {
    height: 100%;
    overflow-y: auto;
    padding: 18px 12px 12px;
    scroll-behavior: smooth;
    font-size: 0.82rem;
    line-height: 1.55;
  }

  #terminal::-webkit-scrollbar { width: 6px; }
  #terminal::-webkit-scrollbar-track { background: var(--bg); }
  #terminal::-webkit-scrollbar-thumb { background: var(--border); }
  #terminal::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

  .line {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 1px 0;
    animation: fadein 0.1s ease;
  }
  @keyframes fadein { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; } }

  .line .ts {
    color: var(--text-dim);
    font-size: 0.7rem;
    flex-shrink: 0;
    user-select: none;
  }
  .line .dir {
    font-size: 0.7rem;
    font-weight: bold;
    flex-shrink: 0;
    width: 20px;
    text-align: center;
  }
  .line.rx .dir { color: var(--accent); text-shadow: 0 0 6px var(--accent); }
  .line.tx .dir { color: var(--tx-color); text-shadow: 0 0 6px var(--tx-color); }
  .line.sys .dir { color: var(--text-dim); }
  .line .msg { word-break: break-all; }
  .line.rx .msg { color: var(--accent); }
  .line.tx .msg { color: var(--tx-color); }
  .line.sys .msg { color: var(--text-dim); font-style: italic; }
  .line.err .msg { color: var(--red); }

  /* Input row */
  .input-row {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 4px 8px;
    align-items: center;
    position: relative;
  }

  .input-row::before {
    content: 'TX';
    font-size: 0.6rem;
    color: var(--tx-color);
    letter-spacing: 0.15em;
    text-shadow: 0 0 6px var(--tx-color);
    flex-shrink: 0;
  }

  #tx-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    color: var(--tx-color);
    caret-color: var(--tx-color);
    padding: 4px;
    letter-spacing: 0.05em;
  }
  #tx-input::placeholder { color: #3a4a3a; }
  #tx-input:disabled { opacity: 0.3; }

  #tx-input:focus ~ .cursor-blink { display: none; }

  #btn-send {
    border-color: #5a4a00;
    color: var(--tx-color);
    padding: 6px 20px;
  }
  #btn-send:hover:not(:disabled) {
    border-color: var(--tx-color);
    color: var(--tx-color);
    box-shadow: 0 0 8px var(--accent-glow);
  }

  /* Quick-send presets */
  .presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .preset-label {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    align-self: center;
    text-transform: uppercase;
  }
  .preset-btn {
    font-size: 0.65rem;
    padding: 4px 10px;
    border-color: #1a2a1a;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 20px;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    flex-shrink: 0;
    padding: 4px 2px;
  }
  .stats span { color: var(--green-dim); }

  /* Not-supported message */
  #no-ble {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--red);
    font-size: 0.9rem;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    BLE UART TERMINAL
    <br><a href="https://github.com/ednieuw/HTML-BLEserial" target="_blank" style="color: inherit; text-decoration: none; border-bottom: 1px solid currentColor; font-size: 60%;">EdSoft @2026 V1.1</a>
  </div>
  <div class="status-bar">
    <div class="status-indicator">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">DISCONNECTED</span>
    </div>
    <div class="separator"></div>
    <span id="device-name">—</span>
  </div>
  <div class="theme-switch" id="theme-switch" title="Toggle light/dark">
    ☀
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
    ☾
  </div>
</header>

<main>
  <div id="no-ble">⚠ Web Bluetooth not supported in this browser.<br>Use Chrome or Edge on desktop/Android.</div>

  <div class="controls">
    <button id="btn-toggle">⬡ CONNECT</button>
    <div class="separator"></div>
    <div class="options">
      <label><input type="checkbox" id="opt-timestamp"> TIMESTAMP</label>
      <label><input type="checkbox" id="opt-autoscroll" checked> AUTOSCROLL</label>
      <select id="opt-newline">
        <option value="crlf">CR+LF</option>
        <option value="lf">LF</option>
        <option value="cr">CR</option>
        <option value="none">NONE</option>
      </select>
      <select id="opt-display">
        <option value="ascii">ASCII</option>
        <option value="hex">HEX</option>
        <option value="both">BOTH</option>
      </select>
    </div>
    <button id="btn-clear">CLR</button>
  </div>

  <div class="presets">
    <span class="preset-label">QUICK:</span>
    <button class="preset-btn" data-cmd="I">INFO</button>
    <button class="preset-btn" data-cmd="T">TIME?</button>
    <button class="preset-btn" data-cmd="S">SYNC</button>
    <button class="preset-btn" data-cmd="R">RESET</button>
    <button class="preset-btn" data-cmd="D">DEBUG</button>
    <button class="preset-btn" data-cmd="H">HELP</button>
  </div>

  <div class="terminal-wrapper">
    <div id="terminal"></div>
  </div>

  <div class="input-row">
    <input type="text" id="tx-input" placeholder="type command and press ENTER or SEND…" disabled autocomplete="off" spellcheck="false">
    <button id="btn-send" disabled>SEND ↵</button>
  </div>

  <div class="stats">
    RX: <span id="stat-rx">0</span> bytes &nbsp;|&nbsp;
    TX: <span id="stat-tx">0</span> bytes &nbsp;|&nbsp;
    MSGS: <span id="stat-msgs">0</span> &nbsp;|&nbsp;
    <span id="stat-service">SERVICE: —</span>
  </div>
</main>

<script>
// ─── Nordic UART Service UUIDs ───────────────────────────────────────────────
const UART_SERVICE_UUID     = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const UART_TX_CHAR_UUID     = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'; // write (host→device)
const UART_RX_CHAR_UUID     = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'; // notify (device→host)

// ─── State ───────────────────────────────────────────────────────────────────
let device = null, server = null, txChar = null, rxChar = null;
let rxBytes = 0, txBytes = 0, msgCount = 0;
let rxBuffer = '';
const history = [];
let histIdx = -1;

// ─── DOM ─────────────────────────────────────────────────────────────────────
const terminal   = document.getElementById('terminal');
const txInput    = document.getElementById('tx-input');
const btnToggle  = document.getElementById('btn-toggle');
const btnSend    = document.getElementById('btn-send');
const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const deviceName = document.getElementById('device-name');
const statRx     = document.getElementById('stat-rx');
const statTx     = document.getElementById('stat-tx');
const statMsgs   = document.getElementById('stat-msgs');
const statSvc    = document.getElementById('stat-service');
const optTS      = document.getElementById('opt-timestamp');
const optScroll  = document.getElementById('opt-autoscroll');
const optNL      = document.getElementById('opt-newline');
const optDisp    = document.getElementById('opt-display');
const noBle      = document.getElementById('no-ble');

// ─── Check Web Bluetooth ─────────────────────────────────────────────────────
if (!navigator.bluetooth) {
  noBle.style.display = 'block';
  btnToggle.disabled = true;
}

// ─── Logging ─────────────────────────────────────────────────────────────────
function ts() {
  const now = new Date();
  return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}.${String(now.getMilliseconds()).padStart(3,'0')}`;
}

function toHexStr(bytes) {
  return Array.from(bytes).map(b => b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
}

function log(text, type = 'sys') {
  const line = document.createElement('div');
  line.className = `line ${type}`;

  const tsEl = document.createElement('span');
  tsEl.className = 'ts';
  tsEl.textContent = optTS.checked ? ts() : '';

  const dir = document.createElement('span');
  dir.className = 'dir';
  dir.textContent = type === 'rx' ? '◀' : type === 'tx' ? '▶' : type === 'err' ? '✕' : '·';

  const msg = document.createElement('span');
  msg.className = 'msg';
  msg.textContent = text;

  line.append(tsEl, dir, msg);
  terminal.appendChild(line);
  msgCount++;
  statMsgs.textContent = msgCount;

  if (optScroll.checked) terminal.scrollTop = terminal.scrollHeight;
}

function syslog(msg) { log(msg, 'sys'); }
function errlog(msg) { log(msg, 'err'); }

// ─── Connect ─────────────────────────────────────────────────────────────────
async function connect() {
  try {
    setStatus('connecting');
    syslog('Scanning for BLE UART devices…');

    device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [UART_SERVICE_UUID] }],
      optionalServices: [UART_SERVICE_UUID],
      // Skip OS pairing dialog where possible
    });

    syslog(`Found: ${device.name || 'Unknown'}`);
    device.addEventListener('gattserverdisconnected', onDisconnected);

    // Windows BLE often drops the first GATT connect — retry up to 3x
    let retries = 3;
    while (retries--) {
      try {
        server = await device.gatt.connect();
        break;
      } catch(e) {
        if (retries === 0) throw e;
        syslog(`GATT connect failed, retrying… (${retries} left)`);
        await new Promise(r => setTimeout(r, 1000));
      }
    }
    syslog('GATT connected, discovering services…');

    const service = await server.getPrimaryService(UART_SERVICE_UUID);
    statSvc.textContent = `SERVICE: NUS`;

    txChar = await service.getCharacteristic(UART_TX_CHAR_UUID);
    rxChar = await service.getCharacteristic(UART_RX_CHAR_UUID);

    await rxChar.startNotifications();
    rxChar.addEventListener('characteristicvaluechanged', onRx);

    setStatus('connected', device.name || 'Unknown');
    syslog(`Connected to [${device.name || 'Unknown'}] — ready.`);
    enableUI(true);

  } catch (err) {
    setStatus('disconnected');
    if (err.name !== 'NotFoundError') errlog(`Connect failed: ${err.message}`);
    else syslog('Scan cancelled.');
  }
}

// ─── Disconnect ──────────────────────────────────────────────────────────────
async function disconnect() {
  if (device && device.gatt.connected) {
    device.gatt.disconnect();
  }
}

function onDisconnected() {
  setStatus('disconnected');
  enableUI(false);
  syslog('Device disconnected.');
  device = null; server = null; txChar = null; rxChar = null;
}

// ─── RX ──────────────────────────────────────────────────────────────────────
function onRx(event) {
  const value = event.target.value;
  const bytes = new Uint8Array(value.buffer);
  rxBytes += bytes.length;
  statRx.textContent = rxBytes;

  const text = new TextDecoder().decode(bytes);
  const disp = optDisp.value;

  if (disp === 'hex') {
    log(toHexStr(bytes), 'rx');
  } else if (disp === 'both') {
    log(`${text.replace(/[\r\n]+/g, '↵')}  [${toHexStr(bytes)}]`, 'rx');
  } else {
    // Buffer lines
    rxBuffer += text;
    const lines = rxBuffer.split(/\r?\n/);
    rxBuffer = lines.pop(); // keep incomplete last chunk
    lines.forEach(l => l.length && log(l, 'rx'));
  }
}

// ─── TX ──────────────────────────────────────────────────────────────────────
async function send(text) {
  if (!txChar) { errlog('Not connected.'); return; }
  if (!text.trim() && text === '') return;

  let payload = text;
  if (optNL.value === 'crlf') payload += '\r\n';
  else if (optNL.value === 'lf') payload += '\n';
  else if (optNL.value === 'cr') payload += '\r';

  const encoded = new TextEncoder().encode(payload);

  // Split into 20-byte MTU-safe chunks
  try {
    for (let i = 0; i < encoded.length; i += 20) {
      await txChar.writeValue(encoded.slice(i, i + 20));
    }
    txBytes += encoded.length;
    statTx.textContent = txBytes;
    log(text, 'tx');

    // History
    if (history[0] !== text) history.unshift(text);
    if (history.length > 50) history.pop();
    histIdx = -1;
  } catch (err) {
    errlog(`Send failed: ${err.message}`);
  }
}

// ─── UI helpers ─────────────────────────────────────────────────────────────
function setStatus(state, name = '—') {
  statusDot.className = `dot ${state === 'connected' ? 'connected' : state === 'connecting' ? 'connecting' : ''}`;
  statusText.textContent = state.toUpperCase();
  deviceName.textContent = state === 'connected' ? name : '—';
}

function enableUI(connected) {
  btnToggle.textContent = connected ? '✕ DISCONNECT' : '⬡ CONNECT';
  btnToggle.classList.toggle('connected', connected);
  txInput.disabled = !connected;
  btnSend.disabled = !connected;
  document.querySelectorAll('.preset-btn').forEach(b => b.disabled = !connected);
  if (connected) txInput.focus();
}

// ─── Events ──────────────────────────────────────────────────────────────────
btnToggle.addEventListener('click', () => {
  if (device && device.gatt.connected) disconnect();
  else connect();
});
btnSend.addEventListener('click', () => {
  send(txInput.value);
  txInput.value = '';
});

txInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    send(txInput.value);
    txInput.value = '';
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) {
      histIdx++;
      txInput.value = history[histIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; txInput.value = history[histIdx]; }
    else if (histIdx === 0) { histIdx = -1; txInput.value = ''; }
  }
});

document.getElementById('btn-clear').addEventListener('click', () => {
  terminal.innerHTML = '';
  syslog('Terminal cleared.');
});

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.disabled = true;
  btn.addEventListener('click', () => {
    send(btn.dataset.cmd);
  });
});

// ─── Theme toggle ────────────────────────────────────────────────────────────
document.getElementById('theme-switch').addEventListener('click', () => {
  document.documentElement.classList.toggle('light');
});

// ─── Startup ─────────────────────────────────────────────────────────────────
syslog('BLE UART Terminal ready. Click CONNECT to scan for devices.');
syslog('Using Nordic UART Service (NUS) — compatible with most word clock firmware.');
</script>
